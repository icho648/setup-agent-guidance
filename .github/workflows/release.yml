name: release skill packages

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the artifact name (e.g. v1.0.1)."
        required: false
        default: "local"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Build skill artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install --quiet skills-ref pyyaml

      - name: Validate every skill package
        run: |
          set -e
          shopt -s nullglob
          skills=(plugins/*/skills/*/)
          if [ "${#skills[@]}" -eq 0 ]; then
            echo "No skill packages found under plugins/*/skills/*/" >&2
            exit 1
          fi
          for skill in "${skills[@]}"; do
            python -m skills_ref.cli validate "$(pwd)/${skill%/}"
          done

      - name: Compute archive suffix
        id: name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "suffix=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=${{ inputs.tag_suffix }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .skill archive per skill
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist
          skills=(plugins/*/skills/*/)
          for skill in "${skills[@]}"; do
            name="$(basename "${skill%/}")"
            archive="dist/${name}-${{ steps.name.outputs.suffix }}.skill"
            ( cd "${skill}" && zip -r "${GITHUB_WORKSPACE}/${archive}" . \
                -x "*.swp" -x ".DS_Store" -x ".*" )
            echo "Built ${archive}"
          done
          ls -la dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skills-${{ steps.name.outputs.suffix }}
          path: dist/*.skill
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
