name: release skill package

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the artifact name (e.g. v1.0.1)."
        required: false
        default: "local"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: Build skill artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install --quiet skills-ref

      - name: Validate skill directory
        run: python -m skills_ref.cli validate "$(pwd)"

      - name: Compute archive name
        id: name
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "suffix=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "suffix=${{ inputs.tag_suffix }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .skill archive
        run: |
          set -euo pipefail
          name="setup-agent-guidance-${{ steps.name.outputs.suffix }}"
          zip -r "${name}.skill" . \
            -x ".git/*" \
            -x ".github/*" \
            -x ".venv/*" \
            -x "*.skill" \
            -x "*.swp" \
            -x ".DS_Store" \
            -x ".*"
          echo "Built ${name}.skill"
          ls -la "${name}.skill"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: setup-agent-guidance-${{ steps.name.outputs.suffix }}
          path: setup-agent-guidance-*.skill
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: setup-agent-guidance-*.skill
          generate_release_notes: true
