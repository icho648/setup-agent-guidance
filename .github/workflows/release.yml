name: release skill packages

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the artifact name (e.g. v1.0.1)."
        required: false
        default: "local"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Build skill artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install --quiet skills-ref

      - name: Validate every skill package
        run: |
          set -e
          shopt -s nullglob
          skills=(plugins/*/skills/*/)
          if [ "${#skills[@]}" -eq 0 ]; then
            echo "No skill packages found under plugins/*/skills/*/" >&2
            exit 1
          fi
          for skill in "${skills[@]}"; do
            python -m skills_ref.cli validate "$(pwd)/${skill%/}"
          done

      - name: Compute archive suffix
        id: name
        env:
          INPUT_TAG_SUFFIX: ${{ inputs.tag_suffix }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            suffix="${GITHUB_REF_NAME}"
          else
            suffix="${INPUT_TAG_SUFFIX}"
          fi
          if [[ ! "${suffix}" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid archive suffix: use letters, digits, dot, underscore, or hyphen" >&2
            exit 1
          fi
          printf 'suffix=%s\n' "${suffix}" >> "$GITHUB_OUTPUT"

      - name: Build .skill archive per skill
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p dist
          skills=(plugins/*/skills/*/)
          for skill in "${skills[@]}"; do
            name="$(basename "${skill%/}")"
            archive="${GITHUB_WORKSPACE}/dist/${name}-${{ steps.name.outputs.suffix }}.skill"
            plugin_dir="$(cd "${skill%/}/../.." && pwd)"
            stage="$(mktemp -d)"
            cp -R "${skill%/}/." "${stage}/"
            [ -f "${plugin_dir}/LICENSE" ] && cp "${plugin_dir}/LICENSE" "${stage}/LICENSE"
            ( cd "${stage}" && zip -r "${archive}" . \
                -x "*.swp" -x ".DS_Store" -x ".*" )
            rm -rf "${stage}"
            echo "Built ${archive}"
          done
          ls -la dist/

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skills-${{ steps.name.outputs.suffix }}
          path: dist/*.skill
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.skill
          generate_release_notes: true
