name: validate skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: skills-ref validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install --quiet skills-ref

      - name: Validate every skill package
        run: |
          set -e
          shopt -s nullglob
          skills=(plugins/*/skills/*/)
          if [ "${#skills[@]}" -eq 0 ]; then
            echo "No skill packages found under plugins/*/skills/*/" >&2
            exit 1
          fi
          for skill in "${skills[@]}"; do
            echo "::group::Validating ${skill}"
            python -m skills_ref.cli validate "$(pwd)/${skill%/}"
            echo "::endgroup::"
          done

      - name: Validate marketplace and plugin manifests
        run: |
          python - <<'PY'
          import json
          import pathlib

          root = pathlib.Path(".")
          marketplace = root / ".claude-plugin" / "marketplace.json"
          assert marketplace.is_file(), "missing .claude-plugin/marketplace.json"
          data = json.loads(marketplace.read_text())

          assert "name" in data and data["name"], "marketplace.json missing name"
          assert "plugins" in data and isinstance(data["plugins"], list) and data["plugins"], \
              "marketplace.json must list at least one plugin"

          for plug in data["plugins"]:
              assert "name" in plug and plug["name"], "plugin entry missing name"
              assert "description" in plug and plug["description"], \
                  f"plugin {plug.get('name')} missing description"
              source = plug.get("source")
              assert isinstance(source, str) and source.startswith("./"), \
                  f"plugin {plug['name']} source must be a local './...' path"
              plug_dir = (root / source).resolve()
              assert plug_dir.is_dir(), f"plugin {plug['name']} source {source} does not exist"
              manifest = plug_dir / ".claude-plugin" / "plugin.json"
              assert manifest.is_file(), f"plugin {plug['name']} missing .claude-plugin/plugin.json"
              mdata = json.loads(manifest.read_text())
              assert mdata.get("name") == plug["name"], \
                  f"plugin {plug['name']} plugin.json name mismatch: {mdata.get('name')}"
              skill_root = plug_dir / "skills" / plug["name"]
              assert skill_root.is_dir(), \
                  f"plugin {plug['name']} missing skills/{plug['name']}/"
              assert (skill_root / "SKILL.md").is_file(), \
                  f"plugin {plug['name']} missing SKILL.md"
              print(f"OK: {plug['name']} -> {source}")

          names = [p["name"] for p in data["plugins"]]
          assert len(names) == len(set(names)), f"duplicate plugin names: {names}"
          print(f"marketplace {data['name']} lists {len(names)} plugin(s): {names}")
          PY

      - name: Verify SKILL.md relative path references resolve
        run: |
          python - <<'PY'
          import pathlib
          import re

          root = pathlib.Path(".")
          skills = sorted(root.glob("plugins/*/skills/*/SKILL.md"))
          assert skills, "no SKILL.md found"
          for skill in skills:
              skill_dir = skill.parent
              text = skill.read_text()
              refs = set()
              for m in re.finditer(r'(?<![\w/])((?:references|assets)/[A-Za-z0-9_.\-/]+)', text):
                  ref = m.group(1).rstrip('.,;:)]/').rstrip('/')
                  if not ref or '.' not in ref.rsplit('/', 1)[-1]:
                      continue
                  refs.add(ref)
              for ref in sorted(refs):
                  target = skill_dir / ref
                  assert target.exists(), \
                      f"{skill}: referenced path '{ref}' does not resolve from {skill_dir}"
              print(f"{skill}: {len(refs)} referenced path(s) OK")
          PY
