name: validate skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: skills-ref validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install --quiet skills-ref

      - name: Validate skill directory
        run: python -m skills_ref.cli validate .

      - name: Confirm required files exist
        run: |
          set -e
          test -f SKILL.md
          test -d references
          test -d assets
          test -d agents
          echo "Layout OK"

      - name: Confirm description length
        run: |
          python - <<'PY'
          import re, pathlib
          text = pathlib.Path("SKILL.md").read_text()
          m = re.match(r"---\n(.*?)\n---", text, re.S)
          assert m, "missing frontmatter"
          frontmatter = m.group(1).splitlines()
          desc = None
          for i, line in enumerate(frontmatter):
              if line.startswith("description:"):
                  value = line.split(":", 1)[1].strip()
                  if value in {">-", "|"}:
                      lines = []
                      for cont in frontmatter[i + 1:]:
                          if cont and not cont.startswith(" "):
                              break
                          lines.append(cont.strip())
                      desc = " ".join(lines).strip()
                  else:
                      desc = value
                  break
          assert desc, "missing description"
          assert len(desc) <= 1024, f"description too long: {len(desc)}"
          print(f"description length: {len(desc)} / 1024")
          PY