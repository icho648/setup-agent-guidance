name: validate skill

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: skills-ref validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref
        run: pip install --quiet skills-ref pyyaml

      - name: Validate skill directory
        run: python -m skills_ref.cli validate "$(pwd)"

      - name: Confirm required files exist
        run: |
          set -e
          test -f SKILL.md
          test -d references
          test -d assets
          test -d agents
          echo "Layout OK"

      - name: Confirm description length
        run: |
          python - <<'PY'
          import pathlib
          import yaml

          text = pathlib.Path("SKILL.md").read_text()
          assert text.startswith("---\n"), "missing frontmatter"
          end = text.find("\n---", 4)
          assert end != -1, "unterminated frontmatter"
          front = yaml.safe_load(text[4:end])
          desc = (front or {}).get("description")
          assert isinstance(desc, str) and desc.strip(), "missing description"
          assert len(desc) <= 1024, f"description too long: {len(desc)}"
          print(f"description length: {len(desc)} / 1024")
          PY